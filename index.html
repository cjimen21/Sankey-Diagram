<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankey Diagram</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Sankey Diagram for Subject's ICV Data</h1>
    <div id="sankey"></div>

    <script>
        // Insert the data generated from Python here
        var labels = ["ICV", "Diencephalon", "Mesencephalon", "Metencephalon", "Telencephalon", "BasalForebrain", "Thalamus", "Cerebellum", "Cerebral Cortex", "Hippocampus", "Anterior", "Posterior", "Left", "Right", "Central"]; // Replace with your output
        var sources = [0, 0, 0, 0, 1, 1, 2, 2, 3]; // Replace with your output
        var targets = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // Replace with your output
        var values = [150, 200, 250, 300, 350, 180, 170, 160, 150]; // Replace with your output

        var data = [{
            type: "sankey",
            orientation: "h",
            node: {
                pad: 15,
                thickness: 20,
                line: { color: "black", width: 0.5 },
                label: labels,
                color: "blue"
            },
            link: {
                source: sources,
                target: targets,
                value: values
            }
        }];

        var layout = {
            title: "Sankey Diagram for Subject's ICV Data",
            font: { size: 10 },
            paper_bgcolor: 'black',
            font: {
                color: 'white'
            }
        };

        Plotly.newPlot("sankey", data, layout);
    </script>
</body>
</html>
